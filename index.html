<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tutor MJD</title>

<script>
window.MathJax = { tex: { inlineMath: [['$', '$']], displayMath: [['$$','$$']], processEscapes: true }, svg: {fontCache: 'global'} };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root { --main: #0056b3; --bg: #f0f2f5; --chat-bg: #ffffff; }
* { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
body { margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; }

header { background: var(--main); color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10;}
.title { font-size: 1.3rem; font-weight: bold; margin:0;}

#chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 85%; padding: 12px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
.msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
.msg p { margin: 0 0 8px 0; }
.msg p:last-child { margin-bottom: 0; }

.user { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 4px; }
.bot { align-self: flex-start; background: var(--chat-bg); border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

#preview_container {
  display:none; padding:10px 15px; background:#e9ecef;
  border-top:1px solid #ddd; font-size:14px; color:#495057;
  align-items:center; justify-content:space-between;
}
#preview_container span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:80%; font-weight:bold; }
.btn-remove { background:#dc3545; color:white; border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; }

#input-area { background:white; padding:10px; display:flex; gap:8px; border-top:1px solid #ddd; align-items:center; }

input[type="text"] { flex:1; padding:12px 15px; border-radius:20px; border:1px solid #ccc; font-size:16px; outline:none; transition:border 0.3s; }
input[type="text"]:focus { border-color: var(--main); }

.btn { background: var(--main); color:white; border:none; width:45px; height:45px; border-radius:50%; font-size:18px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition: background 0.2s; }
.btn:disabled { background:#adb5bd; cursor:not-allowed; }
.btn-clip { background:#6c757d; font-size:20px; }
</style>
</head>

<body>

<header>
<h1 class="title">🤖 Tutor MJD</h1>
</header>

<div id="chat">
<div class="msg bot">
¡Hola! Soy Tutor MJD. Puedes escribirme tu duda matemática o tocar el clip (📎) para tomarle una foto a tu guía de clase o a tu cuaderno. ¡Empecemos!
</div>
</div>

<div id="preview_container">
<span id="file_name">Archivo seleccionado</span>
<button class="btn-remove" onclick="limpiarArchivo()">✖</button>
</div>

<div id="input-area">
<input type="file" id="file_input" accept="image/*,application/pdf" style="display:none;" onchange="manejarArchivo()">
<button class="btn btn-clip" onclick="document.getElementById('file_input').click()">📎</button>
<input type="text" id="mensaje" placeholder="Escribe aquí tu duda..." autocomplete="off"/>
<button id="btn_enviar" class="btn" onclick="enviarMensaje()">➤</button>
</div>

<script>

// ── URL del backend en Cloud Run ──
const SERVER_URL = "https://tutor-mjd-api-411083505938.us-central1.run.app/chat";

let historialSesion = [];
let archivoActualBase64 = null;
let mimeTypeActual = null;

function agregarMensaje(htmlContent, clase) {
  const chat = document.getElementById("chat");
  const msgDiv = document.createElement("div");
  msgDiv.className = `msg ${clase}`;
  msgDiv.innerHTML = htmlContent;
  chat.appendChild(msgDiv);
  chat.scrollTop = chat.scrollHeight;
  return msgDiv;
}

function procesarTextoSeguro(texto) {
  const mathBlocks = [];
  let textoProtegido = texto.replace(/(\$\$[\s\S]*?\$\$|\$[\s\S]*?\$)/g, (match) => {
    mathBlocks.push(match);
    return `###MATH_BLOCK_${mathBlocks.length - 1}###`;
  });
  let htmlParseado = marked.parse(textoProtegido);
  mathBlocks.forEach((block, index) => {
    htmlParseado = htmlParseado.replace(`###MATH_BLOCK_${index}###`, block);
  });
  return htmlParseado;
}

function manejarArchivo() {
  const file_input = document.getElementById("file_input");
  const file = file_input.files[0]; // ← BUG CORREGIDO: era files sin [0]
  if (!file) return;

  const btn = document.getElementById("btn_enviar");
  if(btn) btn.disabled = true;

  document.getElementById("file_name").innerText = "⏳ Procesando...";
  document.getElementById("preview_container").style.display = "flex";
  mimeTypeActual = file.type || "application/pdf";

  const reader = new FileReader();
  reader.onload = function(e) {
    archivoActualBase64 = e.target.result.split(',')[1]; // ← BUG CORREGIDO: era split(',') sin [1]
    document.getElementById("file_name").innerText = "✅ " + file.name;
    if(btn) btn.disabled = false;
  };
  reader.onerror = function() {
    document.getElementById("file_name").innerText = "⚠️ Error al leer archivo";
    if(btn) btn.disabled = false;
  };
  reader.readAsDataURL(file);
}

function limpiarArchivo() {
  document.getElementById("file_input").value = "";
  archivoActualBase64 = null;
  mimeTypeActual = null;
  document.getElementById("file_name").innerText = "";
  document.getElementById("preview_container").style.display = "none";
}

async function enviarMensaje() {
  const input = document.getElementById("mensaje");
  const txt = input.value.trim();
  if(!txt && !archivoActualBase64) return;

  let contenidoVisual = txt;
  if (archivoActualBase64) {
    if (mimeTypeActual.startsWith('image/')) {
      contenidoVisual += (txt ? "<br><br>" : "") +
        `<img src="data:${mimeTypeActual};base64,${archivoActualBase64}">`;
    } else {
      const nombreLimpio = document.getElementById("file_name").innerText.replace("✅ ","");
      contenidoVisual += (txt ? "<br><br>" : "") + `<i>📄 Archivo adjunto: ${nombreLimpio}</i>`;
    }
  }

  agregarMensaje(contenidoVisual, "user");
  input.value = "";

  const payload = {
    msg: txt,
    historial: [...historialSesion],
    file_b64: archivoActualBase64,
    mime_type: mimeTypeActual
  };

  historialSesion.push({
    role: "user",
    content: txt || "[El estudiante envió un archivo para su análisis]"
  });

  limpiarArchivo();

  const loadMsg = agregarMensaje("Tutor MJD está analizando...","bot");

  try {
    const res = await fetch(SERVER_URL, {
      method: "POST",
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    loadMsg.remove();

    if(data.reply) {
      historialSesion.push({role: "model", content: data.reply});
      const htmlParseado = procesarTextoSeguro(data.reply);
      const msgDiv = agregarMensaje(htmlParseado, "bot");
      if(window.MathJax) MathJax.typesetPromise([msgDiv]);
    }
  } catch(e) {
    loadMsg.remove();
    agregarMensaje("⚠️ Error de conexión. Revisa tu internet o avisa a los profesores.", "bot");
    console.error(e);
  }
}

document.getElementById("mensaje").addEventListener("keypress", e => {
  if(e.key === "Enter") {
    const btn = document.getElementById("btn_enviar");
    if(!btn.disabled) enviarMensaje();
  }
});

</script>
</body>
</html>
